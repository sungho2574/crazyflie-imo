# Qualisys mocap 모드용 로봇 설정.
# crazyswarm2 crazyflies.yaml 포맷(fileversion 3)을 따른다.
# ⚠️ URI / 기체 이름 / initial_position 은 실제 값으로 교체할 것.
fileversion: 3

robots:
  cf231:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E7E7      # 현재값 유지 (Crazyflie 기본 주소)
    initial_position: [0.0, 0.0, 0.0]     # mocap 좌표계 기준 이륙 위치
    type: cf21_active                     # Active Marker Deck + Qualisys

robot_types:
  cf21_active:
    # Active Marker Deck + Qualisys: QTM 이 마커 ID 로 rigid body(6DOF)를 직접 산출 -> vendor.
    # ⚠️ QTM 의 rigid body(AIM) 이름을 crazyflie 이름과 동일하게(cf231) 만들어야 pose 가 매칭됨.
    motion_capture:
      enabled: true
      tracking: "vendor"                   # mocap 소프트웨어(QTM)가 주는 6DOF 사용
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

  # (참고) passive 반사마커용 타입 — 지금은 사용 안 함
  cf21_mocap_deck:
    motion_capture:
      enabled: true
      tracking: "librigidbodytracker"     # QTM 마커 스트리밍 -> 라이브러리가 6DOF 추적
      marker: mocap_deck                   # motion_capture.yaml 의 marker_configurations 키와 일치
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

  cf21_single_marker:
    motion_capture:
      enabled: true
      tracking: "librigidbodytracker"
      marker: default_single_marker
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

all:
  reference_frame: "world"
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2      # 2 = Kalman (mocap 사용 시 필수)
      controller: 2     # 2 = Mellinger
  firmware_logging:
    enabled: true
    default_topics:
      pose:
        frequency: 50   # Hz — mocap 기반 상태추정 결과 = ground truth pose
      status:
        frequency: 1    # Hz — 배터리/통신 상태 (voltage_warning 감시에 필요)
    custom_topics:
      imu_raw:
        frequency: 100
        vars: ["acc.x", "acc.y", "acc.z", "gyro.x", "gyro.y", "gyro.z"]
      motor_pwm:
        frequency: 100
        vars: ["motor.m1", "motor.m2", "motor.m3", "motor.m4"]
