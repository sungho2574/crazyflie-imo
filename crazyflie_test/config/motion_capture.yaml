# crazyswarm2 원본 crazyflie/config/motion_capture.yaml 을 Qualisys용으로 수정.
# QTM 6DOF 계산을 끄고 마커를 스트리밍하는지(librigidbodytracker) 여부는
# crazyflies_mocap.yaml 의 robot_types 아래 motion_capture.tracking 으로 결정된다
# ("vendor" = QTM가 6DOF 계산 / "librigidbodytracker" = 마커 스트리밍 후 라이브러리 추적).
/motion_capture_tracking:
  ros__parameters:
    # one of "optitrack", "optitrack_closed_source", "vicon", "qualisys", "nokov", "vrpn", "motionanalysis"
    type: "qualisys"
    hostname: "192.168.0.33"      # QTM 실행 PC IP

    topics:
      frame_id: "mocap"
      poses:
        qos:
          mode: "sensor"
          deadline: 100.0         # Hz
      tf:
        child_frame_id: "{}_mocap"

    marker_configurations:
      default:  # 표준 Crazyflie
        offset: [0.0, 0.0, 0.0]
        points:
          p0: [   0.0,    0.0, 0.022]  # top
          p1: [-0.042,  0.042, 0.0  ]  # back left   (M3)
          p2: [-0.042, -0.042, 0.0  ]  # back right  (M2)
          p3: [ 0.042, -0.042, 0.0  ]  # front right (M1)
      default_single_marker:
        offset: [0.0, -0.01, -0.04]
        points:
          p0: [0.0177184, 0.0139654, 0.0557585]
      mocap_deck:
        offset: [0.0, 0.0, -0.01]
        points:
          p0: [ 0.03,  0.00, 0.0]   # front
          p1: [ 0.00, -0.03, 0.0]   # right
          p2: [-0.015, 0.00, 0.0]   # back
          p3: [ 0.00,  0.03, 0.0]   # left
      medium_frame:
        offset: [0.0, 0.0, -0.03]
        points:
          p0: [-0.00896228, -0.000716753, 0.0716129]
          p1: [-0.0156318,   0.0997402,   0.0508162]
          p2: [ 0.0461693,  -0.0881012,   0.0380672]
          p3: [-0.0789959,  -0.0269793,   0.0461144]
      big_frame:
        offset: [0.0, 0.0, -0.06]
        points:
          p0: [ 0.0558163, -0.00196302, 0.0945539]
          p1: [-0.0113941,  0.00945842, 0.0984811]
          p2: [-0.0306277,  0.0514879,  0.0520456]
          p3: [ 0.0535816, -0.0400775,  0.0432799]

    dynamics_configurations:
      default:
        max_velocity: [2.0, 2.0, 3.0]           # m/s
        max_angular_velocity: [20.0, 20.0, 10.0] # rad/s
        max_roll: 1.4                            # rad
        max_pitch: 1.4                           # rad
        max_fitness_score: 0.001

    # rigid_bodies 는 launch 파일이 crazyflies.yaml 을 읽어 자동 생성한다.
