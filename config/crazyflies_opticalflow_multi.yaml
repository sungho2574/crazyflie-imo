# Flow deck 온보드 추정 기반 멀티 기체 설정 (mocap 노드 미사용).
# crazyswarm2 crazyflies.yaml 포맷(fileversion 3)을 따른다.
#
# ⚠️ optical flow 는 각 기체가 "자기 이륙 지점 기준" 상대 추정을 하므로 공통 절대 좌표계가 없다.
#    => 멀티 비행은 브로드캐스트 상대 이동(allcfs.goTo, 항상 relative)으로만 안전하게 편대 유지 가능.
#    => 기체들은 바닥에서 서로 충분히 떨어뜨려 배치할 것 (같은 상대 이동을 동시에 수행하므로 간격 유지됨).
# ⚠️ URI / 기체 이름 / initial_position 은 실제 값으로 교체할 것.
fileversion: 3

robots:
  cf1:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E701      # TODO: 실제 URI로 교체
    initial_position: [0.0, 0.0, 0.0]
    type: cf21_flow
  cf2:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E702      # TODO: 실제 URI로 교체
    initial_position: [1.0, 0.0, 0.0]     # cf1 과 1m 간격 (물리 배치도 동일하게)
    type: cf21_flow
  cf3:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E703      # TODO: 실제 URI로 교체
    initial_position: [2.0, 0.0, 0.0]
    type: cf21_flow

robot_types:
  cf21_flow:
    motion_capture:
      enabled: false                      # mocap 미사용
      tracking: "vendor"
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

all:
  reference_frame: "world"
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2      # Kalman
      controller: 1     # 1 = PID — Flow deck 사용 시 Mellinger보다 안정적
  firmware_logging:
    enabled: true
    default_topics:
      pose:
        frequency: 50
      status:
        frequency: 1    # Hz — 배터리/통신 상태 (voltage_warning 감시에 필요)
    custom_topics:
      imu_raw:
        frequency: 100
        vars: ["acc.x", "acc.y", "acc.z", "gyro.x", "gyro.y", "gyro.z"]
      motor_pwm:
        frequency: 100
        vars: ["motor.m1", "motor.m2", "motor.m3", "motor.m4"]
